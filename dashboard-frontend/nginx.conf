server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to dashboard-api service
    location /api/ {
        proxy_pass https://dashboard-api-290164040879.us-central1.run.app;
        proxy_set_header Host dashboard-api-290164040879.us-central1.run.app;
        proxy_ssl_server_name on;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
